<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Sheetal</title>
    <!-- Links -->
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/custom.css">
    <link href="https://fonts.googleapis.com/css2?family=Host+Grotesk:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

    <!-- 2. MAIN CONTENT -->
    <div id="main-content"> 
    <nav class="container-fluid vh-100 d-flex flex-column p-0 p-md-4 overflow-hidden">
            <div class="d-flex justify-content-between align-items-start nav-web-view">
                <div class="nav-item fw-bold brand-logo" id="go-home">s</div>
                <div class="nav-item"><a href="#" id="open-about">about</a></div>
            </div>

            <div class="d-flex justify-content-between align-items-center nav-mobile-view p-4">
                <div class="nav-item fw-bold brand-logo" id="go-home-mobile">s</div>
                <div class="nav-mobile-view-sec">
                    <div class="nav-item"><a href="#" id="open-about-mobile">about</a></div>
                    <div class="nav-item"><a href="#" class="open-contact-btn">contact</a></div>
                </div>
            </div>

            <div class="flex-grow-1 d-flex align-items-start justify-content-center position-relative">
                <div id="home-view" class="w-100 text-center">
                    <video autoplay muted loop playsinline class="main-video">
                        <source src="image/loader.mp4" type="video/mp4">
                    </video>
                </div>
                
                <!-- ART GALLERY VIEW -->
                <div id="gallery-view" class="container-fluid d-none">
                    <div class="row h-100 p-4-mobile">
                        <div class="col-md-3 no-padding-left pt-md-5" id="mobile-list-container">
                            <ul class="gallery-list list-unstyled" id="gallery-items-list">
                                <!-- Dynamic Projects Load Here -->
                            </ul>
                        </div>

                        <div class="col-md-6 d-flex flex-column align-items-start pt-md-5 d-none-mobile"
                            id="mobile-work-container">
                            <div class="work-header-mobile w-100 d-flex align-items-center mb-4 d-md-none">
                                <div id="back-to-list" style="cursor:pointer;"><i
                                        class="fa-solid fa-arrow-left-long me-3"></i></div>
                                <div class="work-title-small">
                                    <span id="display-num">01</span> <span id="display-title-mobile"
                                        class="text-uppercase fw-bold">PROJECT TITLE</span>
                                </div>
                            </div>

                            <div class="display-box w-100">
                                <div class="bg-gray-box">
                                    <img src="" alt="Artwork" class="art-img d-none" id="main-gallery-img">
                                    <div id="gallery-text-content" class="d-none text-start p-2 scrollbar-sec">
                                        <h4 class="fw-bold text-uppercase mb-4 d-none-mobile-text" id="text-title">
                                            PROJECT TITLE</h4>
                                        <div class="metadata mb-4">
                                            <!-- Dynamic Metadata Load Here -->
                                        </div>
                                        <p class="description-body" id="display-desc">
                                            <!-- Dynamic Description Load Here -->
                                        </p>
                                    </div>
                                </div>
                            </div>

                            <div class="display-footer d-flex justify-content-between w-100 pt-2 px-1 mt-4">
                                <div class="footer-link" id="next-image" style="cursor: pointer;">
                                    <i class="fa-solid fa-arrow-right-long"></i>
                                </div>
                                <div class="footer-link text-lowercase" id="read-btn" style="cursor: pointer;font-size: 15px;">read
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="row align-items-end pb-4 w-100 m-0 bottom-nav-row">
                <div class="col-md-4 d-none d-md-block"></div>
                <div class="col-12 col-md-4 d-flex justify-content-center gap-5 mb-3 mb-md-0">
                    <div class="nav-item"><a href="#" id="show-art" class="category-trigger" data-category="art">art</a></div>
                    <div class="nav-item"><a href="#" id="show-books" class="category-trigger" data-category="books">books</a></div>
                    <div class="nav-item"><a href="#" id="show-design" class="category-trigger" data-category="design">design</a></div>
                </div>
                <div class="col-md-4 text-end d-none d-md-block" style="padding-right: 0 !important;">
                    <div class="nav-item"><a href="#" class="open-contact-btn">contact</a></div>
                </div>
            </div>
        </nav>
    </div>

    <!-- 3. ABOUT SIDE PANEL -->
    <div id="about-panel" class="side-panel">
        <div class="panel-header d-flex justify-content-between align-items-center">
            <a href="javascript:void(0)" id="close-about" class="nav-item text-muted">close</a>
            <div class="d-flex gap-4">
                <span class="nav-item fw-bold text-black">about</span>
                <a href="#" class="nav-item open-contact-btn text-muted d-md-none">contact</a>
            </div>
        </div>
        <div class="panel-body">
            <div class="about-image-container mb-4">
                <img src="" alt="About" class="img-fluid filter-bw" id="about-img">
            </div>
            <div class="about-text mt-5">
                <p class="mb-4" id="about-intro"></p>
                <p>
                    <span id="about-more-span" style="display: none;"></span>
                </p>
                <a href="javascript:void(0)" id="read-more-trigger" class="read-more-btn">Read more</a>
            </div>


            <div class="press-section mt-5 pt-4">
                <h5 class="press-header">PRESS</h5>
                <div id="press-list">
                    <!-- Dynamic Press Items Load Here -->
                </div>
            </div>
        </div>
    </div>

    <!-- 4. CONTACT OVERLAY -->
    <div id="contact-panel" class="contact-card">
        <div class="d-flex justify-content-between align-items-center mb-5">
            <a href="javascript:void(0)" id="close-contact" class="text-muted text-decoration-none">close</a>
            <div class="d-flex gap-4">
                <a href="#" id="open-about-from-contact" class="text-muted text-decoration-none">about</a>
                <span class="fw-bold text-black contact-text" id="contact-overlay-text">contact</span>
            </div>
        </div>
        <div class="contact-email-row">
            <a href="" class="contact-link" id="contact-email"></a>
        </div>
        <div class="contact-insta-row mt-3 d-flex align-items-center">
            <i class="fa-brands fa-instagram me-2"></i>
            <a href="" target="_blank" class="contact-link" id="contact-insta"></a>
        </div>
        <div class="d-flex justify-content-end mt-4" id="contact-mobile-text">
            <span class="fw-bold text-black contact-text">contact</span>
        </div>
    </div>

    <!-- 5. PANEL OVERLAY -->
    <div id="panel-overlay"></div>

    <!-- Scripts -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/main.js"></script>
</body>

</html>
